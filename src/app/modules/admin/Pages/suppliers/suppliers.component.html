<!-- src/app/modules/admin/pages/suppliers/suppliers.component.html -->
<div class="suppliers-page">
  <div class="page-header">
    <h1>الموردين</h1>
    <button class="btn btn-primary" (click)="openAddModal()">
      + إضافة مورد جديد
    </button>
  </div>

  <!-- البحث -->
  <div class="search-box">
    <input 
      type="text" 
      [(ngModel)]="searchTerm"
      (keyup.enter)="search()"
      placeholder="بحث عن مورد..."
    >
    <button (click)="search()">بحث</button>
  </div>

  <!-- حالة التحميل -->
  <div class="loading" *ngIf="loading">جاري التحميل...</div>
  <div class="error" *ngIf="error">{{error}}</div>

  <!-- جدول الموردين -->
  <div class="table-container" *ngIf="!loading && !error">
    <table class="table">
      <thead>
        <tr>
          <th>#</th>
          <th>الاسم</th>
          <th>جهة الاتصال</th>
          <th>البريد</th>
          <th>الهاتف</th>
          <th>الحالة</th>
          <th>الإجراءات</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let supplier of suppliers">
          <td>{{supplier.id}}</td>
          <td>{{supplier.name}}</td>
          <td>{{supplier.contactName || '-'}}</td>
          <td>{{supplier.email || '-'}}</td>
          <td>{{supplier.phone || '-'}}</td>
          <td>
            <span class="badge" [class.active]="supplier.isActive" [class.inactive]="!supplier.isActive">
              {{supplier.isActive ? 'نشط' : 'غير نشط'}}
            </span>
          </td>
          <td>
            <button class="btn-icon" (click)="openEditModal(supplier)" title="تعديل">✏️</button>
            <button class="btn-icon" (click)="deleteSupplier(supplier.id)" title="حذف">🗑️</button>
            <button class="btn-icon" (click)="toggleStatus(supplier)" title="تغيير الحالة">
              {{supplier.isActive ? '🔴' : '🟢'}}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    
    <!-- Pagination -->
    <div class="pagination" *ngIf="totalPages > 1">
      <button [disabled]="currentPage === 1" (click)="changePage(currentPage - 1)">السابق</button>
      <span>صفحة {{currentPage}} من {{totalPages}}</span>
      <button [disabled]="currentPage === totalPages" (click)="changePage(currentPage + 1)">التالي</button>
    </div>
  </div>
</div>
