<div class="page">
  <header class="page-header pb-1">
    <h2 class="text-center text-gold">Business Details</h2>
    <p class="text-center">Use simple, clear details so buyers can better trust and verify.</p>
  </header>

  <!-- Basic Business Details -->
  <section class="card">
    <h5 class="text-burgandy pb-2">Basic Business Details</h5>

    <form class="form-grid">
      <label class="field full">
        <span>Business Name</span>
        <input class="input-main" type="text" placeholder="Enter your business name" />
      </label>

      <label class="field">
        <span>Business Email</span>
        <input class="input-main" type="email" placeholder="name@company.com" />
      </label>

      <label class="field">
        <span>Phone Number</span>
        <input class="input-main" type="tel" placeholder="+1 555 123 4567" />
      </label>

      <label class="field">
        <span>Country / Region</span>
        <select class="select-main">
          <option selected>Select country</option>
          <option>United States</option>
          <option>United Kingdom</option>
          <option>Germany</option>
          <option>India</option>
        </select>
      </label>

      <label class="field">
        <span>City</span>
        <input class="input-main" type="text" placeholder="City" />
      </label>

      <label class="field">
        <span>Postal / ZIP Code</span>
        <input class="input-main" type="text" placeholder="ZIP / Postal code" />
      </label>

      <label class="field full">
        <span>Street Address</span>
        <input class="input-main" type="text" placeholder="Building, street, floor, etc." />
      </label>

      <label class="field full">
        <span>Business Website (optional)</span>
        <input class="input-main" type="url" placeholder="https://yourcompany.com" />
      </label>
    </form>
  </section>

  <!-- Cover Photo -->
  <section class="card">
    <h5 class="text-burgandy">Cover Photo</h5>
    <p class="hint">Upload a header image that best represents your business.</p>

    <div class="cover-box">
      <img
        src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1200&q=80"
        alt="Business cover"
      />
      <button class="btn-main btn-gold w-25">Upload new cover</button>
    </div>
  </section>

  <!-- About Your Business -->
  <section class="card">
    <h5 class="text-burgandy">About Your Business</h5>
    <p class="hint">Share a short story about what you do and who you serve.</p>

    <label class="field full">
      <span>Business Description</span>
      <textarea class="textarea-main" rows="5" placeholder="Describe your products, capacity, and experience..."></textarea>
    </label>
  </section>

  <!-- Other Information -->
  <section class="card">
    <h5 class="text-burgandy">Other Information</h5>

    <form class="form-grid pb-3">
      <label class="field full">
        <span>Years in Business</span>
        <input class="input-main" type="number" min="0" placeholder="e.g. 5" />
      </label>

      <label class="field full">
        <span>Primary Product Categories</span>
        <input class="input-main" type="text" placeholder="e.g. candles, textile dyes, packaging" />
      </label>

      <label class="field full">
        <span>Certifications / Compliance (optional)</span>
        <input class="input-main" type="text" placeholder="ISO, Fair Trade, Organic, etc." />
      </label>
    </form>
    <div class="actions-row">
    <button class="btn-main btn-gold">Save Business Details</button>
  </div>
  </section>

  
</div>
