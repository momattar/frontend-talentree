<div class="page">
  <!-- Poster / hero -->
  <section class="poster">
    <div class="poster-text">
      <h1>Account Settings</h1>
      <h6>Update your profile, keep info secure, and manage preferences.</h6>
    </div>
    <div class="poster-img">
      <img src="../../../../../assets/images/setting.jfif" alt="Dashboard illustration" />
    </div>
  </section>

  <!-- Profile card -->
  <section class="card profile-card">
    <h2 class="text-center text-gold">Profile Information</h2>
    <p class="subtitle text-center">Manage your personal info and keep it up to date.</p>

    <div class="avatar-row">
      <img
        class="avatar"
        src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=200&q=80"
        alt="Profile avatar"
      />
      <button class="btn-main btn-gold">Upload new photo</button>
    </div>

    <form class="form-grid ">
      <label class="field">
        <span>Full Name</span>
        <input class="input-main" type="text" placeholder="Your name" />
      </label>

      <label class="field">
        <span>Email</span>
        <input class="input-main" type="email" placeholder="you@example.com" />
      </label>

      <label class="field">
        <span>Phone Number</span>
        <input class="input-main" type="tel" placeholder="+1 555 123 4567" />
      </label>

      <label class="field">
        <span>Language</span>
        <input class="input-main" type="text" placeholder="English" />
      </label>
      <div class="actions-row">
        <button type="button" class="btn-main btn-burgandy w-25 ">Save Changes</button>
      </div>
        
      
      
    </form>
  </section>
</div>
